name: Gyre
options:
  bundleIdPrefix: com.gyre
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "52GYU3BNFZ"

targets:
  Gyre:
    type: application
    platform: iOS
    sources:
      - path: Gyre
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanjerla.gyre
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    info:
      path: Gyre/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: "Gyre needs your location to show nearby schools and track your commute to class."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Gyre needs your location to show nearby schools and track your commute to class."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - location
    entitlements:
      path: Gyre/Gyre.entitlements
      properties: {}
    dependencies:
      - target: GyreWidgets

  GyreWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GyreWidgets
    info:
      path: GyreWidgets/Info.plist
      properties:
        CFBundleDisplayName: Gyre Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanjerla.gyre.widgets
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    entitlements:
      path: GyreWidgets/GyreWidgets.entitlements
      properties: {}
